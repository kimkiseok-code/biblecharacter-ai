<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패 — BibleCharacter.AI</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1A1610; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Pretendard', sans-serif; padding: 20px; }
.box { background: #FAF6EC; border: 1px solid rgba(184,149,42,0.4); border-radius: 18px; padding: 40px 32px; max-width: 380px; width: 100%; text-align: center; }
.icon { font-size: 40px; margin-bottom: 12px; }
.divider { width: 40px; height: 2px; background: #B8952A; margin: 0 auto 16px; border-radius: 2px; }
.title { font-size: 20px; font-weight: 700; color: #2A2318; margin-bottom: 10px; }
.desc { font-size: 13px; color: #5A4E3A; line-height: 1.8; margin-bottom: 28px; }
.btn { display: block; width: 100%; background: #B8952A; border: none; border-radius: 12px; padding: 14px; font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 700; color: #2A2318; cursor: pointer; text-decoration: none; margin-bottom: 10px; }
.btn:hover { background: #9A7A1E; }
.btn-sub { display: block; width: 100%; background: transparent; border: 1px solid rgba(184,149,42,0.3); border-radius: 12px; padding: 12px; font-family: 'Pretendard', sans-serif; font-size: 13px; color: #8A7A60; cursor: pointer; text-decoration: none; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🙏</div>
  <div class="divider"></div>
  <div class="title">결제가 취소됐어요</div>
  <div class="desc" id="desc">결제가 완료되지 않았습니다.<br>다시 시도하시거나 무료로 이용하세요.</div>
  <a href="/" class="btn">다시 시도하기</a>
  <a href="/" class="btn-sub">무료로 계속하기</a>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const msg = params.get('message');
  if(msg) document.getElementById('desc').textContent = msg;
</script>
</body>
</html>
